name: Build macOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # Release 생성/업로드에 필요

jobs:
  build-macos:
    runs-on: macos-latest  # Apple Silicon (arm64)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install pyinstaller

      - name: Show Python / PyInstaller info
        run: |
          python --version
          python -c "import PySide6, sys; print('PySide6:', PySide6.__version__); print('python:', sys.executable)"
          python -m PyInstaller --version

      - name: Build .app
        run: |
          chmod +x scripts/build_release.sh
          # 빌드 스크립트 대신 직접 호출 (venv 활성화 코드 우회)
          python -m PyInstaller build/build.spec --clean --noconfirm
          ls -lh dist/

      - name: Package as ZIP
        run: |
          VERSION="1.0.0"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          cd dist
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent \
            "11st_auto_order.app" "11st_auto_order-${VERSION}-mac.zip"
          ls -lh

      - name: Verify build
        run: |
          if [ ! -d "dist/11st_auto_order.app" ]; then
            echo "dist/11st_auto_order.app 가 만들어지지 않았습니다."
            exit 1
          fi
          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 11st_auto_order-macos
          path: dist/*.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
