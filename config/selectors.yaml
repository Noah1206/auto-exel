# 11번가 셀렉터 설정 파일 (유지보수 포인트)
# 셀렉터가 변경되면 이 파일만 수정하여 대응 (재컴파일 불필요)
version: "1.0"
updated_at: "2026-04-21"

product_page:
  # 가격 셀렉터는 11번가 개편이 잦아 아래 순서로 시도한다.
  # 모두 실패하면 price_scraper 가 JS evaluate 로 "원" 텍스트 최대값을 fallback 추출.
  price:
    # data-attribute 계열 (가장 안정적)
    - 'strong[class*="c_product_detail__price"]'
    - '.c_product_detail__price strong'
    - '.c_product_detail__price'
    - '[itemprop="price"]'
    # 신형 클래스 패턴 (PascalCase/kebab-case 섞임 대응)
    - 'strong[class*="SellPrice" i]'
    - 'div[class*="SellPrice" i] strong'
    - 'em.price-value'
    - 'span.price-value'
    - '[class*="price-value" i]'
    # 일반 패턴
    - 'strong[class*="price" i]'
    - 'em[class*="price" i]'
    - 'div[class*="finalPrice" i]'
    - 'div[class*="final_price" i]'
    - 'span[class*="finalPrice" i]'
    # 구 셀렉터 (하위 호환 유지)
    - 'span.price_detail strong'
    - '.c_product_price_detail .price'
    - 'em.price_sell'
  original_price:
    - 'span.price_original del'
    - '.c_product_price_original'
  # 옵션이 있는 상품에서 "선택한 옵션 추가하기" 버튼 (빨간색 +).
  # 이 버튼을 눌러야 옵션이 장바구니에 담기면서 아래쪽의 "구매하기" 가
  # 활성화된다. 옵션이 URL 로 미리 선택돼 있어도 이 단계를 강제하는
  # 상품이 있음 (예: 아마존 해외직구관 일부).
  add_selected_option:
    - 'button:has-text("선택한 옵션 추가")'
    - 'button:has-text("선택한 옵션 추가하기")'
    - 'a:has-text("선택한 옵션 추가"):not([href*="cart"]):not([href*="my11st"])'
    # 클래스 패턴 (11번가 개편 대응)
    - 'button[class*="AddOption" i]'
    - 'button[class*="addOption" i]'
    - 'button[class*="add_option" i]'
    - 'button[class*="Option" i][class*="Add" i]'
    # data attribute
    - '[data-log-actionid-label*="option_add"]'
    - '[data-log-actionid-label*="add_option"]'
    - '[data-log-body*="option_add"]'
  buy_now_button:
    # ⚠ "주문하기" 단독 매칭은 금지 — 헤더의 "주문내역/주문배송조회" 링크에
    #    오매칭되어 /my11st/order/OrderList 로 이탈하는 사고가 있었다.
    # 한글 텍스트 변형 — "구매" 가 포함된 명확한 버튼만
    - 'button:has-text("바로구매")'
    - 'button:has-text("바로 구매")'
    - 'button:has-text("구매하기")'
    - 'button:has-text("지금구매")'
    - 'button:has-text("지금 구매")'
    - 'button:has-text("바로주문")'
    # a 태그는 href 에 my11st/order 가 들어간 마이페이지 링크 제외
    - 'a:has-text("바로구매"):not([href*="my11st"]):not([href*="OrderList"])'
    - 'a:has-text("바로 구매"):not([href*="my11st"]):not([href*="OrderList"])'
    - 'a:has-text("구매하기"):not([href*="my11st"]):not([href*="OrderList"])'
    # 영문
    - 'button:has-text("BUY NOW")'
    - 'button:has-text("Buy Now")'
    # 클래스 패턴
    - 'button.buy_now'
    - 'button[class*="BuyNow" i]'
    - 'button[class*="buy_now" i]'
    - 'button[class*="Order" i][class*="Button" i]'
    - 'button[class*="purchase" i]'
    - 'button[class*="Purchase" i]'
    - 'a[class*="BuyNow" i]'
    - 'a[class*="buy_now" i]'
    # data-attribute (가장 안정적)
    - '[data-log-actionid-label*="buy_now"]'
    - '[data-log-actionid-label*="purchase"]'
    - '[data-log-actionid-label*="order"]'
    - '[data-log-body*="buy_now"]'
    - '[data-log-body*="purchase"]'
  add_to_cart:
    - 'button:has-text("장바구니")'
    - 'button.cart_add'
  quantity_input:
    # 11번가 아마존관 신 UI (사이드바 카트 안의 input)
    - '.c_product_input input[aria-live="assertive"]'
    - '.c_product_input input.form_input'
    - '.c-card-item__cart input[type="text"]'
    - 'input[aria-label="주문 수량"]'
    # 일반 11번가
    - 'input.qty_input'
    - 'input[name="selectQuantity"]'
    - 'input[name="buyQty"]'
    - 'input[name="orderQty"]'
    - 'input[name*="qty" i]'
    - 'input[name*="Qty" i]'
    - 'input[type="number"][class*="qty" i]'
    - 'input[type="number"][aria-label*="수량"]'
    - 'input[aria-label*="수량"]'
    - 'input[role="spinbutton"]'
    - 'div[class*="option" i] input[type="text"][value]'
    - 'div[class*="quantity" i] input'
    - 'div[class*="Quantity" i] input'
  quantity_plus_button:
    # 11번가 아마존관 신 UI — 사이드바 카트의 + 버튼 (count2 가 +)
    - 'button.c_product_btn_count2'
    - '.c_product_input .form_add button:nth-of-type(2)'
    - '.c-card-item__cart button:nth-of-type(2)'
    # 일반 패턴
    - 'button.qty_plus'
    - 'button[aria-label*="증가"]'
    - 'button[aria-label*="추가"]'
    - 'button[aria-label="+"]'
    - 'button[title*="증가"]'
    - 'div[class*="quantity" i] button:nth-of-type(2)'
    - 'div[class*="Quantity" i] button:last-of-type'
    - 'button:has-text("+"):not(:has-text("추가하기"))'
  quantity_minus_button:
    # 11번가 아마존관 신 UI — 사이드바 카트의 - 버튼 (count1 이 -)
    - 'button.c_product_btn_count1'
    - '.c_product_input .form_add button:nth-of-type(1)'
    - '.c-card-item__cart button:nth-of-type(1)'
    # 일반 패턴
    - 'button.qty_minus'
    - 'button[aria-label*="감소"]'
    - 'button[aria-label="-"]'
    - 'button[title*="감소"]'
    - 'div[class*="quantity" i] button:nth-of-type(1)'
    - 'div[class*="Quantity" i] button:first-of-type'
    - 'button:has-text("-"):not(:has-text("삭제"))'
  quantity_select:
    - 'select[name="selectQuantity"]'
    - 'select[name="orderQty"]'
    - 'select.qty_select'
    - 'select[name*="qty" i]'
  login_required:
    - '.login_popup'
    - 'text=로그인이 필요합니다'

order_page:
  # 배송지 모드 라디오 — "직접입력" 을 선택해야 받는사람/주소 입력창이 나타남
  # (기본배송지가 기본 선택되면 입력 필드가 DOM 상 숨겨짐)
  direct_input_radio:
    - 'input[type="radio"][value*="direct" i]'
    - 'input[type="radio"][value*="DIRECT" i]'
    - 'input[type="radio"][value*="new" i]'
    - 'label:has-text("직접입력") input[type="radio"]'
    - 'label:has-text("직접 입력") input[type="radio"]'
    - 'label:has-text("신규") input[type="radio"]'
    - 'label:has-text("새로운") input[type="radio"]'
  # 라디오를 직접 못 누르면 label 자체를 클릭
  direct_input_label:
    - 'label:has-text("직접입력")'
    - 'label:has-text("직접 입력")'
    - 'label:has-text("신규 배송지")'
    - 'label:has-text("새로운 배송지")'
    - 'button:has-text("직접입력")'
    - 'button:has-text("신규 배송지")'
    - 'a:has-text("배송지 직접")'
    - 'a:has-text("직접 입력")'
  # 통관번호도 "직접입력/신규" 로 전환해야 하는 경우
  customs_direct_input:
    - 'label:has-text("직접 입력") input[type="radio"][name*="customs" i]'
    - 'label:has-text("직접입력") input[type="radio"][name*="prsn" i]'
    - 'button:has-text("개인통관고유부호 직접입력")'
    - 'button:has-text("새 통관번호 입력")'

  recipient_name:
    - 'input[name="recvNm"]'
    - 'input#recvNm'
    - 'input[name="rcvrNm"]'
    - 'input#rcvrNm'
    - 'input[placeholder="받는 사람"]'
    - 'input[placeholder*="받는"]'
    - 'input[placeholder*="수취인"]'
    - 'input[name*="recipientName" i]'
    - 'input[id*="recipient" i]'
    - 'input[name*="rcvr" i][name*="Nm" i]'
  phone:
    # 통합 필드 (하이픈 포함 11자리 그대로 받는 케이스)
    - 'input[name="recvMobileNo"]'
    - 'input#recvMobileNo'
    - 'input[name="rcvrMblNo"]'
    - 'input[placeholder*="휴대전화 전체"]'
  phone_prefix:
    # 010 등 prefix select
    - 'select[name="recvMobileNo1"]'
    - 'select[name="rcvrMblNo1"]'
    - 'select[name*="mbl" i][name*="1"]'
    - 'select[name*="mobile" i][name*="1"]'
  phone_middle:
    # "휴대폰 앞자리"
    - 'input[name="recvMobileNo2"]'
    - 'input[name="rcvrMblNo2"]'
    - 'input[placeholder="휴대폰 앞자리"]'
    - 'input[placeholder*="앞자리"]'
  phone_suffix:
    # "휴대폰 뒷자리"
    - 'input[name="recvMobileNo3"]'
    - 'input[name="rcvrMblNo3"]'
    - 'input[placeholder="휴대폰 뒷자리"]'
    - 'input[placeholder*="뒷자리"]'
  zipcode_search_button:
    - 'button:has-text("주소찾기")'
    - 'button:has-text("우편번호")'
    - 'button:has-text("주소 검색")'
    - 'button.btn_zip_search'
  zipcode_input:
    - 'input[name="zipCd"]'
    - 'input#zipCd'
    - 'input[name="rcvrZipNo"]'
    - 'input[placeholder="우편번호"]'
    - 'input[placeholder*="우편번호"]'
  zipcode_popup_search_input:
    - 'input[name="keyword"]'
    - 'input[placeholder*="도로명"]'
    - 'input[placeholder*="검색"]'
  zipcode_popup_search_button:
    - 'button:has-text("검색")'
  zipcode_popup_container:
    - 'iframe[name*="zip" i]'
    - '.layer_addr'
    - '[class*="AddressSearch" i]'
  zipcode_popup_result_items:
    # 검색 결과 행들 — 클릭 가능한 도로명 주소 항목
    - '.layer_addr li'
    - '[class*="AddressSearch" i] li'
    - '[class*="result" i] li'
    - 'ul[class*="addr" i] li'
    - '.search_result_box li'
  address_base:
    # "기본 주소"
    - 'input[name="addr"]'
    - 'input#addr'
    - 'input[name="baseAddr"]'
    - 'input[name="rcvrBaseAddr"]'
    - 'input[placeholder="기본 주소"]'
    - 'input[placeholder*="기본 주소"]'
  address_detail:
    # "상세 주소 및 상세 건물명"
    - 'input[name="addrDtl"]'
    - 'input#addrDtl'
    - 'input[name="dtlsAddr"]'
    - 'input[name="rcvrDtlsAddr"]'
    - 'input[placeholder*="상세 주소"]'
    - 'input[placeholder*="상세주소"]'
    - 'input[placeholder*="상세 건물"]'
  customs_id:
    # "개인통관 고유부호 (P로 시작하는 13자리)"
    - 'input[name="psnCscUniqNo"]'   # 11번가 아마존관 해외직구 (2026-04 확인)
    - 'input#psnCscUniqNo'
    - 'input[name="prsnCstmsCd"]'
    - 'input#prsnCstmsCd'
    - 'input[placeholder*="P로 시작"]'
    - 'input[placeholder*="P12345678912"]'
    - 'input[placeholder*="개인통관"]'
    - 'input[placeholder*="통관"]'
    - 'input[name*="prsn" i][name*="Cstms" i]'
    - 'input[name*="Csc" i][name*="Uniq" i]'
  customs_section_expand:
    # "조회", "신청", "발급" 같은 외부 이동 버튼은 제외
    - 'button:has-text("개인통관고유부호 입력")'
    - 'button:has-text("직접 입력"):not(:has-text("조회")):not(:has-text("신청"))'
    - 'a:has-text("개인통관고유부호 입력"):not([target="_blank"]):not([href*="customs.go.kr"])'
  english_name:
    # "영문이름 입력 (예:HONG GILDONG)"
    - 'input[name="ordEngNm"]'        # 11번가 아마존관 (2026-04 확인)
    - 'input#ordEngNm'
    - 'input[name="engNm"]'
    - 'input#engNm'
    - 'input[name="rcvrEngNm"]'
    - 'input[placeholder*="영문이름"]'
    - 'input[placeholder*="HONG GILDONG"]'
    - 'input[placeholder*="영문"]'
    - 'input[name*="eng" i][name*="Nm" i]'
    - 'input[id*="eng" i][id*="Nm" i]'
  english_first_name:
    - 'input[name="engFirstNm"]'
    - 'input[name="ordEngFirstNm"]'
    - 'input[placeholder*="이름(영문)"]'
    - 'input[placeholder*="First"]'
  english_last_name:
    - 'input[name="engLastNm"]'
    - 'input[name="ordEngLastNm"]'
    - 'input[placeholder*="성(영문)"]'
    - 'input[placeholder*="Last"]'
  payment_card:
    - 'input[type="radio"][value="card"]'
    - 'label:has-text("신용카드")'
    - 'label:has-text("카드결제")'
    - 'button:has-text("신용카드")'
  payment_default:
    # 11번가 계정에 저장된 기본 결제 수단(있으면 사용). 없으면 카드로.
    - 'input[type="radio"]:checked[name*="pay" i]'
  final_pay_button:
    - 'button:has-text("결제하기")'
    - 'button:has-text("결제 하기")'
    - 'a:has-text("결제하기")'
    - 'button.btn_pay'
    - 'button[class*="Payment" i][class*="Button" i]'
    - 'button[class*="pay_btn" i]'
    - '[data-log-actionid-label*="payment"]'
  agree_all_checkbox:
    - 'input[type="checkbox"][name="agreeAll"]'
    - 'input[type="checkbox"][name*="allAgree" i]'
    - 'label:has-text("전체 동의")'
    - 'label:has-text("모두 동의")'
    - 'label:has-text("전체동의")'

confirmation:
  order_number:
    - '.order_number strong'
    - 'span[class*="OrderNo"]'
    - 'strong:right-of(:text("주문번호"))'
    - 'dd.order_no'
    - 'em.order_number'
    - '.c_order_number'
    - 'a[href*="orderDetail"]'
    - 'a[href*="OrderDetail"]'
    - ':text("주문번호") + *'
    - ':text("주문번호") ~ strong'
    - ':text("주문번호") ~ em'
    - ':text("주문번호") ~ span'
  complete_message:
    - 'text=주문이 완료'
    - '.order_complete_msg'
    - 'h2:has-text("완료")'

login_page:
  url_patterns:
    - "login.11st.co.kr"
    - "/login"
    - "/auth"
  id_input:
    - 'input[name="memId"]'
  password_input:
    - 'input[name="memPwd"]'
  login_button:
    - 'button:has-text("로그인")'

# 로그인 상태 감지 (메인 페이지/마이페이지에서 사용)
logged_in:
  # 로그인되어 있으면 보이는 요소 (마이페이지/장바구니/로그아웃 링크 등)
  indicators:
    - 'a:has-text("로그아웃")'
    - 'button:has-text("로그아웃")'
    - 'a:has-text("마이페이지")'
    - 'a[href*="logout" i]'
    - 'a[href*="myPage" i]'
    - 'a[href*="MyPage" i]'
  # 로그인 안 된 상태에서 보이는 요소
  guest_indicators:
    - 'a:has-text("로그인")'
    - 'button:has-text("로그인")'
    - 'a[href*="login.11st.co.kr"]'

error_detection:
  captcha:
    - '.captcha_box'
    - 'img[alt*="캡차"]'
    - 'iframe[src*="captcha"]'
    - 'iframe[src*="recaptcha"]'
  out_of_stock:
    - 'text=품절'
    - 'text=재고 없음'
    - 'text=SOLD OUT'
    - '.soldout'
    - '[class*="SoldOut" i]'
  # 판매중지/판매종료/삭제 — 품절보다 강한 영구적 판매 불가 상태
  product_unavailable:
    - 'text=판매중지된 상품'
    - 'text=판매가 중단된 상품'
    - 'text=판매가 종료된 상품'
    - 'text=판매종료'
    - 'text=판매 종료'
    - 'text=판매중지'
    - 'text=판매 중지'
    - 'text=존재하지 않는 상품'
    - 'text=삭제된 상품'
    - 'text=찾으시는 상품이 없습니다'
    - 'text=상품을 찾을 수 없습니다'
    - 'text=판매 제한된 상품'
    - 'text=차단된 상품'
    - '[class*="unavailable" i]'
    - '[class*="discontinued" i]'
  error_message:
    - '.error_msg'
    - '.alert_error'
    - '[role="alert"]'
